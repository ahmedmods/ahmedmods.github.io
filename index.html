<style>
:root{
  --emerald:#00b894;--emerald-dark:#00876e;--emerald-glow:rgba(0,184,148,.35);
  --gold:#f9ca24;--gold-soft:#c9a84c;
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--surface3:#21262d;
  --border:rgba(255,255,255,.07);--text:#e6edf3;--text-muted:#7d8590;--text-dim:#484f58;
  --danger:#f85149;--shadow-glow:0 0 40px rgba(0,184,148,.15);
  --nav-h:68px;
}
body.light{--bg:#f0f4f8;--surface:#fff;--surface2:#e8edf2;--surface3:#dde3ea;--border:rgba(0,0,0,.08);--text:#1a1a2e;--text-muted:#5a6a7a;--text-dim:#8a9aaa}
body.gold-theme{--emerald:#c9a84c;--emerald-dark:#9c7e30;--emerald-glow:rgba(201,168,76,.35);--shadow-glow:0 0 40px rgba(201,168,76,.15)}


*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Tajawal',Tahoma,sans-serif;background:var(--bg);color:var(--text);-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea{-webkit-user-select:text;user-select:text}
button{font-family:inherit}


/* ====== SPLASH ====== */
#splash{
  position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  justify-content:center;align-items:center;z-index:9999;transition:opacity .7s ease,transform .7s ease;
}
#splash.out{opacity:0;transform:scale(1.08);pointer-events:none}
.splash-orb{
  width:130px;height:130px;border-radius:38px;
  background:linear-gradient(135deg,var(--emerald-dark),var(--emerald));
  display:flex;align-items:center;justify-content:center;font-size:58px;color:#fff;
  margin-bottom:28px;animation:splashOrb 2s ease-in-out infinite;
  box-shadow:0 20px 60px rgba(0,184,148,.4);
}
@keyframes splashOrb{
  0%,100%{transform:translateY(0) scale(1);box-shadow:0 20px 60px rgba(0,184,148,.4),0 0 0 0 rgba(0,184,148,.3)}
  50%{transform:translateY(-8px) scale(1.03);box-shadow:0 32px 80px rgba(0,184,148,.5),0 0 0 20px rgba(0,184,148,0)}
}
.splash-title{font-size:34px;font-weight:800;color:var(--text)}
.splash-sub{font-size:14px;color:var(--text-muted);margin-top:8px}
.splash-dots{display:flex;gap:8px;margin-top:50px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--emerald);animation:dotBounce 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}


/* ====== APP SHELL ====== */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.screen-wrapper{flex:1;overflow:hidden;position:relative}


/* ====== SCREENS — slide انيميشن ====== */
.screen{
  position:absolute;inset:0;overflow-y:auto;padding:0 16px 110px;
  opacity:0;pointer-events:none;
  transform:translateX(-28px);
  transition:opacity .32s cubic-bezier(.4,0,.2,1), transform .32s cubic-bezier(.4,0,.2,1);
  -webkit-overflow-scrolling:touch;
  will-change:transform,opacity;
}
.screen::-webkit-scrollbar{display:none}.screen{scrollbar-width:none}
.screen.active{opacity:1;transform:translateX(0);pointer-events:all}
.screen.slide-back{transform:translateX(28px)}
